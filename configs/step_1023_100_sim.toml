# ============================================================
# Replicacion simulada del experimento STEP_1023_100
# Objetivo: identificar omega_n y zeta del pendulo libre
#
# Condiciones que replican el ensayo real:
#   - Pendulo largo + attachment (configuracion oficial)
#   - PWM = 1023 -> V = 12.0 V (maximo)
#   - Duracion del escalon: 100 ms (perturbacion impulsiva)
#   - Duracion total: 12 s (captura oscilacion completa ~12 ciclos)
#   - Timestep: 1 ms (1 kHz, igual que el firmware ESP32)
#   - Pendulo parte en equilibrio estable (colgado)
# ============================================================

[simulation]
xml_model    = "mujoco_sim/xml_models/pendulum_model_v3.xml"
duration_sec = 12.0
timestep_sec = 0.001

[initial_conditions]
motor_position_rad = 0.0
pendulum_position  = "down"

[friction]
joint1_damping       = 0.00198
joint1_frictionloss  = 0.02
encoder_damping      = 2.60e-4
encoder_frictionloss = 0.0

[motor]
max_voltage       = 12.0
gainprm           = 0.2116
biasprm           = -0.2311
armature          = 8.797e-3
stall_torque_nm   = 2.540
resistance_ohm    = 5.16
torque_constant   = 1.092
back_emf_constant = 1.092

[input]
type              = "step"
amplitude_voltage = 12.0
start_time_sec    = 0.0
duration_sec      = 0.1

[output]
csv_path  = "results/characterization/step_1023_100_sim.csv"
plot_path = "results/characterization/step_1023_100_sim.png"
show_plot = false
save_video = false
